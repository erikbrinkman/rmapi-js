# Publish a tagged release to npm, then the GitHub release; keep the name release.yml for npm trusted publishing.
name: release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.3.0)"
        required: true
        type: string

permissions:
  contents: write # create the GitHub release
  id-token: write # trusted publishing to npm

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun export
      # node 24 ships npm 11.x, required for OIDC trusted publishing
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm publish --provenance --access public --ignore-scripts
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ inputs.tag }}" --generate-notes --verify-tag
