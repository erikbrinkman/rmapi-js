name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options: [patch, minor, major]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gate:
    uses: ./.github/workflows/build.yml

  changelog:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - id: version
        run: |
          VERSION=$(npm version --no-git-tag-version ${{ inputs.bump }} | sed 's/^v//')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - uses: thomaseizinger/keep-a-changelog-new-release@v3
        with:
          tag: v${{ steps.version.outputs.version }}
      - uses: actions/upload-artifact@v7
        with:
          name: changelog
          path: CHANGELOG.md

  release:
    needs: changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      version: ${{ needs.changelog.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun export

      # bump package.json here in the trusted job, not from the changelog artifact
      - run: npm version --no-git-tag-version ${{ needs.changelog.outputs.version }}
      - uses: actions/download-artifact@v8
        with:
          name: changelog

      - run: |
          VERSION=${{ needs.changelog.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "v${VERSION}"
          git tag -a "v${VERSION}" -m "v${VERSION}"

      # publish before pushing — a failed publish leaves no remote trace
      # Node 24 ships with npm 11.x, required for OIDC trusted publishing
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm publish --provenance --access public --ignore-scripts

      - run: git push --follow-tags
      - run: gh release create "v${{ needs.changelog.outputs.version }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

  build-pages:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: v${{ needs.release.outputs.version }}
          fetch-depth: 1
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun doc
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy-pages:
    needs: build-pages
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - id: deploy
        uses: actions/deploy-pages@v5
