# Build docs from a tag and deploy to Pages; dispatched by cut.yml, re-runnable by hand.
name: docs
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build docs from (e.g. v0.3.0)"
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun doc
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  # separate from the build so a failed deploy re-runs without rebuilding the artifact
  docs-deploy:
    needs: docs-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - id: deploy
        uses: actions/deploy-pages@v5
